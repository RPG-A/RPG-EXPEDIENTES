<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crear Expediente Técnico</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.5 system-ui,Segoe UI,Arial;background:#0f172a;color:#fff;
       display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .card{background:#fff;color:#0f172a;border-radius:16px;padding:34px 28px;width:100%;max-width:420px;
        box-shadow:0 20px 60px rgba(0,0,0,.45);text-align:center}
  .logo{font-weight:800;letter-spacing:.5px;color:#0057FF;margin-bottom:16px;font-size:15px}
  h1{font-size:21px;margin:0 0 6px}
  p{color:#64748b;font-size:14px;margin:0 0 22px}
  button{width:100%;padding:15px;border:0;border-radius:10px;font:700 15px system-ui;cursor:pointer;color:#fff;background:#00A86B}
  .small{font-size:12px;color:#94a3b8;margin-top:16px}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">RPG TECHNOLOGY</div>
    <h1>Crear Expediente Técnico</h1>
    <p>Abrirás una plantilla en blanco. Rellena los datos (incluido el Nº de Expediente) y guárdala: se generará el enlace para la carpeta del proyecto.</p>
    <button onclick="crear()">Empezar expediente nuevo</button>
    <div class="small">Necesitas iniciar sesión como editor.</div>
  </div>
<script>
  function crear(){
    // nombre único con la hora para que siempre cargue la última versión (sin caché)
    window.location.href = 'exp2.html?n=' + Date.now() + '#nuevo';
  }
</script>
</body></html>
