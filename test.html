<!DOCTYPE html>
<html lang="es"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test lectura nube</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font:16px/1.5 system-ui;padding:20px;color:#0f172a;">
<h2>Test de lectura desde la nube (sin cuenta)</h2>
<pre id="out" style="background:#f1f5f9;padding:16px;border-radius:10px;white-space:pre-wrap;font-size:15px;">Cargando…</pre>
<script>
var SB_URL='https://udzqpywkezvhddronhqo.supabase.co';
var SB_KEY='sb_publishable_aJhDOUOqe8SFLJ0_xSpSlQ_NHjvVdif';
var EXP='V2606192138';
var out=document.getElementById('out');
try{
  var sb=supabase.createClient(SB_URL,SB_KEY);
  sb.from('expedientes').select('data,updated_at,updated_by').eq('exp_id',EXP).maybeSingle()
   .then(function(res){
      if(res.error){ out.textContent='ERROR de lectura:\n'+JSON.stringify(res.error,null,2); return; }
      if(!res.data){ out.textContent='NO ENCONTRÓ el expediente '+EXP+' (la lectura sin cuenta no devuelve fila).'; return; }
      var d=res.data.data||{};
      var esObj=(d && typeof d==='object');
      out.textContent=
        'Conexión OK. Fila encontrada.\n'+
        'updated_at: '+res.data.updated_at+'\n'+
        'updated_by: '+res.data.updated_by+'\n'+
        'tipo de data: '+(typeof d)+'\n'+
        'total de campos: '+(esObj?Object.keys(d).length:'(no es objeto)')+'\n\n'+
        'r-cli  = '+JSON.stringify(esObj?d['r-cli']:undefined)+'\n'+
        'sc-cli = '+JSON.stringify(esObj?d['sc-cli']:undefined)+'\n'+
        'r-proy = '+JSON.stringify(esObj?d['r-proy']:undefined)+'\n'+
        'c-rs   = '+JSON.stringify(esObj?d['c-rs']:undefined);
   })
   .catch(function(e){ out.textContent='EXCEPCIÓN:\n'+(e&&e.message?e.message:e); });
}catch(e){ out.textContent='EXCEPCIÓN inicial:\n'+(e&&e.message?e.message:e); }
</script>
</body></html>
